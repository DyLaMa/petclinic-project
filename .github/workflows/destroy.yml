name: Destroy All Resources

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm resource deletion'
        required: true
        default: ''
        type: string

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petclinic-khadimana-petclinic
  TERRAFORM_PATH: terraform/environments/dev
  BUCKET_NAME: petclinic-terraform-state-201900446058

jobs:
  destroy:
    name: Destroy All Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. Please type 'DESTROY' to confirm."
            exit 1
          fi
          echo "✅ Confirmation received. Proceeding with destruction..."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ============================================
      # 1. SUPPRESSION DU BACKEND S3 (pour éviter l'erreur d'état)
      # ============================================
      - name: Delete S3 Bucket Completely
        run: |
          echo "🗑️ SUPPRESSION COMPLÈTE DU BUCKET S3"
          BUCKET="${{ env.BUCKET_NAME }}"
          aws s3 rb s3://${BUCKET} --force 2>/dev/null || echo "ℹ️ Bucket already deleted"
          echo "✅ Bucket S3 supprimé"

      # ============================================
      # 2. NETTOYAGE LOCAL
      # ============================================
      - name: Clean Local Terraform State
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          echo "🗑️ Nettoyage de l'état local..."
          rm -rf .terraform .terraform.lock.hcl terraform.tfstate* .terraform.tfstate.lock.info 2>/dev/null || true
          echo "✅ État local nettoyé"

      # ============================================
      # 3. DÉSACTIVER LE BACKEND S3 DANS main.tf
      # ============================================
      - name: Disable S3 Backend in main.tf
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          echo "🔧 Désactivation du backend S3..."
          cp main.tf main.tf.backup
          sed -i '/terraform {/,/}/d' main.tf
          echo "✅ Backend S3 désactivé"

      # ============================================
      # 4. TERRAFORM INIT (sans backend S3)
      # ============================================
      - name: Terraform Init (local state)
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform init -upgrade

      # ============================================
      # 5. TERRAFORM DESTROY
      # ============================================
      - name: Terraform Destroy
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform destroy -auto-approve

      # ============================================
      # 6. RESTAURER main.tf ET RECRÉER S3
      # ============================================
      - name: Restore main.tf and Recreate S3
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          echo "🔧 Restauration de main.tf..."
          mv main.tf.backup main.tf
          
          echo "📥 Recréation du bucket S3..."
          BUCKET="${{ env.BUCKET_NAME }}"
          aws s3api create-bucket --bucket ${BUCKET} --region ${{ env.AWS_REGION }}
          aws s3api put-bucket-versioning --bucket ${BUCKET} --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption --bucket ${BUCKET} --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
          echo "✅ Bucket S3 recréé"

      - name: Display Completion
        run: |
          echo "============================================"
          echo "  ✅ DESTRUCTION COMPLETE"
          echo "============================================"
          echo "✅ S3 bucket: deleted and recreated"
          echo "✅ Terraform Destroy: executed"
          echo "✅ All resources: destroyed"
          echo "============================================"
          echo "ℹ️ You can now run 'Deploy PetClinic' to redeploy"
          echo "============================================"
