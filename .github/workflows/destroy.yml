name: Destroy All Resources

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm resource deletion'
        required: true
        default: ''
        type: string

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petclinic-khadimana-petclinic
  TERRAFORM_PATH: terraform/environments/dev
  BUCKET_NAME: petclinic-terraform-state-201900446058

jobs:
  destroy:
    name: Destroy All Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. Please type 'DESTROY' to confirm."
            exit 1
          fi
          echo "✅ Confirmation received. Proceeding with destruction..."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ============================================
      # 1. SUPPRESSION DES RESSOURCES AWS
      # ============================================
      - name: Delete ECR Repository
        run: |
          echo "🗑️ Deleting ECR repository..."
          aws ecr delete-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --force 2>/dev/null || echo "ℹ️ Repository already deleted"
          echo "✅ ECR repository deleted"

      - name: Delete Secret
        run: |
          echo "🗑️ Deleting secret..."
          aws secretsmanager delete-secret \
            --secret-id petclinic-khadimana-db-credentials \
            --force-delete-without-recovery \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "ℹ️ Secret already deleted"
          echo "✅ Secret deleted"

      - name: Delete IAM Roles and Policies
        run: |
          echo "🗑️ Deleting IAM Roles..."
          aws iam detach-role-policy \
            --role-name petclinic-khadimana-ecs-execution-role \
            --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
          aws iam detach-role-policy \
            --role-name petclinic-khadimana-ecs-execution-role \
            --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-logs 2>/dev/null || true
          aws iam detach-role-policy \
            --role-name petclinic-khadimana-ecs-execution-role \
            --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-secrets 2>/dev/null || true
          aws iam delete-role --role-name petclinic-khadimana-ecs-execution-role 2>/dev/null || true
          aws iam delete-role --role-name petclinic-khadimana-ecs-task-role 2>/dev/null || true
          aws iam delete-policy --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-logs 2>/dev/null || true
          aws iam delete-policy --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-secrets 2>/dev/null || true
          echo "✅ IAM Roles deleted"

      - name: Delete CloudWatch Log Group
        run: |
          echo "🗑️ Deleting CloudWatch Log Group..."
          aws logs delete-log-group \
            --log-group-name /ecs/${{ env.ECR_REPOSITORY }}-app \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "ℹ️ Log Group already deleted"
          echo "✅ CloudWatch Log Group deleted"

      - name: Delete RDS Subnet Group
        run: |
          echo "🗑️ Deleting RDS Subnet Group..."
          aws rds delete-db-subnet-group \
            --db-subnet-group-name ${{ env.ECR_REPOSITORY }}-db-subnet-group \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "ℹ️ Subnet Group already deleted"
          echo "✅ RDS Subnet Group deleted"

      - name: Delete Target Group
        run: |
          echo "🗑️ Deleting Target Group..."
          TG_NAME="${{ env.ECR_REPOSITORY }}-tg"
          TG_ARN=$(aws elbv2 describe-target-groups --names ${TG_NAME} --region ${{ env.AWS_REGION }} --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ] && [ "$TG_ARN" != "" ]; then
            aws elbv2 delete-target-group --target-group-arn "$TG_ARN" --region ${{ env.AWS_REGION }}
            echo "✅ Target Group deleted"
          else
            echo "ℹ️ Target Group already deleted"
          fi

      # ============================================
      # 2. SUPPRESSION DU VERROU DYNAMODB
      # ============================================
      - name: Delete DynamoDB Lock
        run: |
          echo "🗑️ Suppression du verrou DynamoDB..."
          aws dynamodb delete-item \
            --table-name terraform-locks \
            --key '{"LockID": {"S": "${{ env.BUCKET_NAME }}/dev/terraform.tfstate"}}' \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "ℹ️ Verrou déjà supprimé"
          echo "✅ Verrou DynamoDB supprimé"

      # ============================================
      # 3. SUPPRESSION COMPLÈTE DU BUCKET S3
      # ============================================
      - name: Delete and Recreate S3 Bucket
        run: |
          echo "🗑️ SUPPRESSION COMPLÈTE DU BUCKET S3"
          BUCKET="${{ env.BUCKET_NAME }}"

          # Supprimer le bucket avec force
          echo "📤 Suppression du bucket S3..."
          aws s3 rb s3://${BUCKET} --force 2>/dev/null || echo "ℹ️ Bucket déjà supprimé"

          # Attendre 3 secondes
          sleep 3

          # Recréer le bucket
          echo "📥 Recréation du bucket S3..."
          aws s3api create-bucket --bucket ${BUCKET} --region ${{ env.AWS_REGION }}

          # Activer le versionnement
          aws s3api put-bucket-versioning --bucket ${BUCKET} --versioning-configuration Status=Enabled

          # Activer le chiffrement
          aws s3api put-bucket-encryption --bucket ${BUCKET} --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'

          echo "✅ Bucket S3 recréé"

      # ============================================
      # 4. NETTOYAGE LOCAL
      # ============================================
      - name: Clean Local Terraform State
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          echo "🗑️ Nettoyage de l'état local..."
          rm -rf .terraform .terraform.lock.hcl terraform.tfstate* .terraform.tfstate.lock.info 2>/dev/null || true
          echo "✅ État local nettoyé"

      # ============================================
      # 5. TERRAFORM INIT
      # ============================================
      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform init -upgrade -reconfigure

      - name: Terraform Destroy
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform destroy -auto-approve 2>/dev/null || echo "ℹ️ No resources to destroy"

      - name: Display Completion
        run: |
          echo "============================================"
          echo "  ✅ DESTRUCTION COMPLETE"
          echo "============================================"
          echo "✅ ECR Repository: deleted"
          echo "✅ Secrets: deleted"
          echo "✅ IAM Roles: deleted"
          echo "✅ CloudWatch Logs: deleted"
          echo "✅ RDS Subnet Group: deleted"
          echo "✅ Target Group: deleted"
          echo "✅ DynamoDB lock: deleted"
          echo "✅ S3 bucket: recreated"
          echo "✅ Local state: cleaned"
          echo "============================================"
          echo "ℹ️ You can now run 'Deploy PetClinic' to redeploy"
          echo "============================================"
