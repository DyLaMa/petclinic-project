name: CI/CD Pipeline - PetClinic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petclinic-khadimana-petclinic
  ECS_CLUSTER: petclinic-khadimana-cluster
  ECS_SERVICE: petclinic-khadimana-service
  TERRAFORM_PATH: terraform/environments/dev

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::201900446058:role/petclinic-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: app
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker tag ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG ${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push ${{ env.ECR_REPOSITORY }}:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          terraform init -upgrade

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          terraform apply -auto-approve -var="image_tag=${{ env.IMAGE_TAG }}"

      - name: Smoke Test
        run: |
          ALB_URL=$(cd ${{ env.TERRAFORM_PATH }} && terraform output -raw alb_dns_name)
          echo "Testing application at http://$ALB_URL"
          for i in {1..10}; do
            if curl -s -f http://$ALB_URL/actuator/health; then
              echo "✅ Smoke test passed!"
              exit 0
            fi
            echo "Attempt $i/10 failed, waiting 15 seconds..."
            sleep 15
          done
          echo "❌ Smoke test failed after 10 attempts"
          exit 1

      - name: Display Deployment Info
        run: |
          ALB_URL=$(cd ${{ env.TERRAFORM_PATH }} && terraform output -raw alb_dns_name)
          echo "✅ Application deployed successfully!"
          echo "🌐 URL: http://$ALB_URL"
          echo "📦 Image tag: ${{ env.IMAGE_TAG }}"
