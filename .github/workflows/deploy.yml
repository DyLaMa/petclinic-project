name: Deploy PetClinic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petclinic-khadimana-petclinic
  ECS_CLUSTER: petclinic-khadimana-cluster
  ECS_SERVICE: petclinic-khadimana-service
  TERRAFORM_PATH: terraform/environments/dev
  BUCKET_NAME: petclinic-terraform-state-201900446058

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ============================================
      # 1. RECREATION DU BUCKET S3
      # ============================================
      - name: Recreate S3 Bucket
        run: |
          echo "📥 RECREATION DU BUCKET S3"
          BUCKET="${{ env.BUCKET_NAME }}"
          
          # Vérifier si le bucket existe
          if aws s3api head-bucket --bucket ${BUCKET} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "✅ Bucket ${BUCKET} existe déjà"
          else
            echo "📥 Création du bucket ${BUCKET}..."
            aws s3api create-bucket --bucket ${BUCKET} --region ${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning --bucket ${BUCKET} --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket ${BUCKET} --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
            echo "✅ Bucket ${BUCKET} créé"
          fi

      # ============================================
      # 2. LOGIN ECR
      # ============================================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ============================================
      # 3. BUILD DOCKER
      # ============================================
      - name: Build and push Docker image
        working-directory: app
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          
          # Créer le repository ECR s'il n'existe pas
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }}
          
          echo "📦 Building image..."
          docker build -t ${ECR_URL}:${IMAGE_TAG} .
          docker tag ${ECR_URL}:${IMAGE_TAG} ${ECR_URL}:latest
          docker tag ${ECR_URL}:${IMAGE_TAG} ${ECR_URL}:v1
          
          echo "📤 Pushing image..."
          docker push ${ECR_URL}:${IMAGE_TAG}
          docker push ${ECR_URL}:latest
          docker push ${ECR_URL}:v1
          
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "✅ Image pushed to ECR"

      # ============================================
      # 4. TERRAFORM
      # ============================================
      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform init -upgrade -reconfigure

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform apply -auto-approve -var="image_tag=${{ env.IMAGE_TAG }}"

      # ============================================
      # 5. SMOKE TEST
      # ============================================
      - name: Smoke Test
        run: |
          ALB_URL=$(cd ${{ env.TERRAFORM_PATH }} && terraform output -raw alb_dns_name)
          echo "🧪 Testing application at http://$ALB_URL"
          for i in {1..10}; do
            if curl -s -f http://$ALB_URL/actuator/health; then
              echo "✅ Smoke test passed!"
              exit 0
            fi
            echo "Attempt $i/10 failed, waiting 15 seconds..."
            sleep 15
          done
          echo "❌ Smoke test failed after 10 attempts"
          exit 1

      # ============================================
      # 6. DISPLAY
      # ============================================
      - name: Display Deployment Info
        run: |
          ALB_URL=$(cd ${{ env.TERRAFORM_PATH }} && terraform output -raw alb_dns_name)
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETED"
          echo "============================================"
          echo "🌐 URL: http://$ALB_URL"
          echo "📦 Image tag: ${{ env.IMAGE_TAG }}"
          echo "============================================"
