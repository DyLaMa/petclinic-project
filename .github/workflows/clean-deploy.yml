name: Clean Deploy PetClinic

on:
  workflow_dispatch:
    inputs:
      force_cleanup:
        description: 'Force cleanup of existing resources (yes/no)'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petclinic-khadimana-petclinic
  ECS_CLUSTER: petclinic-khadimana-cluster
  ECS_SERVICE: petclinic-khadimana-service
  TERRAFORM_PATH: terraform/environments/dev
  BUCKET_NAME: petclinic-terraform-state-201900446058

jobs:
  clean-deploy:
    name: Clean Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ============================================
      # 1. NETTOYAGE DES RESSOURCES EXISTANTES
      # ============================================
      - name: Check if force cleanup is enabled
        id: check_cleanup
        run: |
          if [ "${{ github.event.inputs.force_cleanup }}" == "yes" ]; then
            echo "cleanup_enabled=true" >> $GITHUB_OUTPUT
            echo "🧹 Force cleanup enabled - will delete existing resources"
          else
            echo "cleanup_enabled=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Force cleanup disabled - will try to deploy without cleanup"
          fi

      - name: Delete ECR Repository if exists
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        run: |
          echo "🗑️ Checking ECR repository..."
          if aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "🗑️ Deleting ECR repository..."
            aws ecr delete-repository \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --region ${{ env.AWS_REGION }} \
              --force
            echo "✅ ECR repository deleted"
          else
            echo "ℹ️ ECR repository does not exist"
          fi

      - name: Delete Secret if exists
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        run: |
          echo "🗑️ Checking secret..."
          if aws secretsmanager describe-secret --secret-id petclinic-khadimana-db-credentials --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "🗑️ Deleting secret..."
            aws secretsmanager delete-secret \
              --secret-id petclinic-khadimana-db-credentials \
              --force-delete-without-recovery \
              --region ${{ env.AWS_REGION }}
            echo "✅ Secret deleted"
          else
            echo "ℹ️ Secret does not exist"
          fi

      - name: Delete IAM Roles and Policies if exists
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        run: |
          echo "🗑️ Checking IAM Roles..."
          # Détacher les politiques
          aws iam detach-role-policy \
            --role-name petclinic-khadimana-ecs-execution-role \
            --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
          aws iam detach-role-policy \
            --role-name petclinic-khadimana-ecs-execution-role \
            --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-logs 2>/dev/null || true
          aws iam detach-role-policy \
            --role-name petclinic-khadimana-ecs-execution-role \
            --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-secrets 2>/dev/null || true
          # Supprimer les rôles
          aws iam delete-role --role-name petclinic-khadimana-ecs-execution-role 2>/dev/null || true
          aws iam delete-role --role-name petclinic-khadimana-ecs-task-role 2>/dev/null || true
          # Supprimer les politiques
          aws iam delete-policy --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-logs 2>/dev/null || true
          aws iam delete-policy --policy-arn arn:aws:iam::201900446058:policy/petclinic-khadimana-ecs-execution-secrets 2>/dev/null || true
          echo "✅ IAM Roles deleted"

      - name: Delete CloudWatch Log Group if exists
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        run: |
          echo "🗑️ Checking CloudWatch Log Group..."
          if aws logs describe-log-groups --log-group-name-prefix /ecs/${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} 2>/dev/null | grep -q "/ecs/${{ env.ECR_REPOSITORY }}-app"; then
            echo "🗑️ Deleting CloudWatch Log Group..."
            aws logs delete-log-group \
              --log-group-name /ecs/${{ env.ECR_REPOSITORY }}-app \
              --region ${{ env.AWS_REGION }}
            echo "✅ CloudWatch Log Group deleted"
          else
            echo "ℹ️ CloudWatch Log Group does not exist"
          fi

      # ============================================
      # 2. NETTOYAGE DE L'ÉTAT S3
      # ============================================
      - name: Clean S3 State
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        run: |
          echo "🗑️ Cleaning S3 state..."
          # Supprimer le bucket S3 avec force
          aws s3 rb s3://${{ env.BUCKET_NAME }} --force 2>/dev/null || echo "ℹ️ Bucket already deleted"
          # Recréer le bucket
          aws s3api create-bucket \
            --bucket ${{ env.BUCKET_NAME }} \
            --region ${{ env.AWS_REGION }}
          aws s3api put-bucket-versioning \
            --bucket ${{ env.BUCKET_NAME }} \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket ${{ env.BUCKET_NAME }} \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }
              ]
            }'
          echo "✅ S3 bucket cleaned and recreated"

      - name: Clean DynamoDB Lock
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        run: |
          echo "🗑️ Cleaning DynamoDB lock..."
          aws dynamodb delete-item \
            --table-name terraform-locks \
            --key '{"LockID": {"S": "${{ env.BUCKET_NAME }}/dev/terraform.tfstate"}}' \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "ℹ️ Lock already deleted"
          echo "✅ DynamoDB lock cleaned"

      - name: Clean Local Terraform State
        if: steps.check_cleanup.outputs.cleanup_enabled == 'true'
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          echo "🗑️ Cleaning local Terraform state..."
          rm -rf .terraform .terraform.lock.hcl terraform.tfstate* .terraform.tfstate.lock.info 2>/dev/null || true
          echo "✅ Local state cleaned"

      # ============================================
      # 3. DÉPLOIEMENT
      # ============================================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: app
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          echo "📦 Building image..."
          docker build -t ${ECR_URL}:${IMAGE_TAG} .
          docker tag ${ECR_URL}:${IMAGE_TAG} ${ECR_URL}:latest
          docker tag ${ECR_URL}:${IMAGE_TAG} ${ECR_URL}:v1
          echo "📤 Pushing image..."
          docker push ${ECR_URL}:${IMAGE_TAG}
          docker push ${ECR_URL}:latest
          docker push ${ECR_URL}:v1
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "✅ Image pushed to ECR"

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: |
          terraform init -upgrade -reconfigure

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_PATH }}
        run: terraform apply -auto-approve -var="image_tag=${{ env.IMAGE_TAG }}"

      - name: Smoke Test
        run: |
          ALB_URL=$(cd ${{ env.TERRAFORM_PATH }} && terraform output -raw alb_dns_name)
          echo "🧪 Testing application at http://$ALB_URL"
          for i in {1..10}; do
            if curl -s -f http://$ALB_URL/actuator/health; then
              echo "✅ Smoke test passed!"
              exit 0
            fi
            echo "Attempt $i/10 failed, waiting 15 seconds..."
            sleep 15
          done
          echo "❌ Smoke test failed after 10 attempts"
          exit 1

      - name: Display Deployment Info
        run: |
          ALB_URL=$(cd ${{ env.TERRAFORM_PATH }} && terraform output -raw alb_dns_name)
          echo "============================================"
          echo "  ✅ CLEAN DEPLOYMENT COMPLETED"
          echo "============================================"
          echo "🌐 URL: http://$ALB_URL"
          echo "📦 Image tag: ${{ env.IMAGE_TAG }}"
          echo "🧹 Cleanup performed: ${{ github.event.inputs.force_cleanup }}"
          echo "============================================"
